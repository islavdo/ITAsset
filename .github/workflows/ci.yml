name: build-test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore ITAssetAccounting.sln
      - name: Build
        run: dotnet build ITAssetAccounting.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test ITAssetAccounting.sln --configuration Release --no-build --logger trx

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Docker compose build
        run: docker compose -f deploy/docker-compose.yml build
